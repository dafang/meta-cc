# ==================================================================
# SMOKE TESTING BEST PRACTICES (FOR METHODOLOGY)
# ==================================================================

smoke_testing_patterns:
  - pattern: "Test critical path only, not comprehensive coverage"
    rationale: "Smoke tests verify release viability, not correctness"

  - pattern: "Native platform testing with cross-compilation trust"
    rationale: "Balance coverage with CI speed and cost"

  - pattern: "Version consistency as first-class concern"
    rationale: "Version mismatches cause confusion and support issues"

  - pattern: "Clear error messages with fix suggestions"
    rationale: "Failed smoke tests should guide resolution"

  - pattern: "Aggregate failures before reporting"
    rationale: "See all issues at once, faster iteration"

  - pattern: "Block release on smoke test failure"
    rationale: "Never publish broken artifacts"

  - pattern: "Test artifact structure, not just binaries"
    rationale: "Plugin packages, installation scripts also critical"

