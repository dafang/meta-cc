# ==================================================================
# RELEASE ARTIFACTS ANALYSIS
# ==================================================================

release_artifacts:
  binaries:
    cli:
      name: meta-cc
      platforms: 5
      purpose: "CLI tool for parsing and analyzing session history"
      critical_tests:
        - "Binary executes without error"
        - "Version flag works (--version)"
        - "Help text displays (--help)"
        - "Basic command executes (e.g., parse)"

    mcp_server:
      name: meta-cc-mcp
      platforms: 5
      purpose: "MCP server for Claude integration"
      critical_tests:
        - "Binary executes without error"
        - "Can start server (basic startup test)"
        - "Help text displays (--help)"
        - "Responds to basic MCP requests"

  plugin_packages:
    count: 5  # One per platform
    structure:
      - bin/meta-cc[.exe]
      - bin/meta-cc-mcp[.exe]
      - .claude-plugin/plugin.json
      - .claude-plugin/marketplace.json
      - commands/
      - agents/
      - lib/
      - install.sh
      - uninstall.sh
      - README.md
      - LICENSE

    package_names:
      - meta-cc-plugin-{VERSION}-linux-amd64.tar.gz
      - meta-cc-plugin-{VERSION}-linux-arm64.tar.gz
      - meta-cc-plugin-{VERSION}-darwin-amd64.tar.gz
      - meta-cc-plugin-{VERSION}-darwin-arm64.tar.gz
      - meta-cc-plugin-{VERSION}-windows-amd64.tar.gz

    critical_tests:
      - "Archive extracts without errors"
      - "Directory structure is correct"
      - "All required files present"
      - "Binaries are executable (non-Windows)"
      - "plugin.json version matches tag"
      - "marketplace.json version matches tag"

  capabilities_package:
    name: capabilities-latest.tar.gz
    purpose: "Capability source files for /meta command"
    critical_tests:
      - "Archive extracts without errors"
      - "Contains expected .md files"

  checksums:
    file: checksums.txt
    purpose: "SHA256 checksums for verification"
    critical_tests:
      - "File exists"
      - "Contains checksums for all packages"
      - "Checksums are valid SHA256 format"

# ==================================================================
# CURRENT GAPS (FROM ITERATION 2)
# ==================================================================

critical_gaps:
  gap_3:
    name: "Smoke tests for release artifacts"
    priority: CRITICAL
    status: NOT_ADDRESSED
    impact: HIGH
    description: "Release artifacts are built but never verified to work correctly"

    current_state:
      - "Binaries built with GOOS/GOARCH cross-compilation"
      - "No execution verification before release"
      - "No plugin structure validation"
      - "No version consistency checks beyond plugin files"
      - "Broken releases could be published"

    risk_factors:
      - risk: "Cross-compiled binaries may not execute"
        likelihood: MEDIUM
        impact: HIGH
        examples:
          - "Missing runtime dependencies"
          - "Wrong GOARCH for platform"
          - "Binary corruption during build"

      - risk: "Plugin package structure incorrect"
        likelihood: MEDIUM
        impact: MEDIUM
        examples:
          - "Missing files in package"
          - "Incorrect directory structure"
          - "Installation scripts don't work"

      - risk: "Version mismatches across artifacts"
        likelihood: LOW
        impact: MEDIUM
        examples:
          - "Binary version != tag version"
          - "plugin.json version inconsistent"
          - "Version string formatting errors"

      - risk: "MCP server doesn't start"
        likelihood: LOW
        impact: HIGH
        examples:
          - "Missing initialization code"
          - "Port binding issues"
          - "Configuration file problems"

    desired_state:
      - "All binaries verified to execute"
      - "Basic functionality tested (--version, --help)"
      - "Plugin packages verified (structure, files, versions)"
      - "MCP server verified to start"
      - "Smoke tests run on all 5 platforms"
      - "Release blocked if any smoke test fails"

# ==================================================================
# SMOKE TEST REQUIREMENTS
# ==================================================================

smoke_test_requirements:
  scope: "Critical path verification only, not comprehensive testing"

  execution_context:
    where: "GitHub Actions after artifact build, before release creation"
    when: "After 'Create plugin packages' step (step 9)"
    duration_target: "< 5 minutes total"
    failure_behavior: "Block release creation"

  test_categories:
    binary_execution:
      priority: CRITICAL
      tests:
        - "CLI binary executes (--version flag)"
        - "CLI binary shows help (--help flag)"
        - "MCP server binary executes (--help flag)"
        - "No runtime errors on basic execution"

      platforms_to_test:
        - linux-amd64  # Native platform in GitHub Actions
        # Note: Other platforms require emulation (QEMU) - complex
        # Decision: Test only linux-amd64 in CI, trust Go cross-compilation

    version_consistency:
      priority: CRITICAL
      tests:
        - "CLI --version output matches git tag"
        - "MCP --version output matches git tag (if supported)"
        - "plugin.json version matches tag"
        - "marketplace.json version matches tag"
        - "All version strings formatted consistently"

    plugin_structure:
      priority: HIGH
      tests:
        - "Package extracts without errors"
        - "All required directories present"
        - "All required files present"
        - "Binaries are executable (chmod +x check)"
        - "JSON files are valid JSON"
        - "plugin.json has required fields"

    basic_functionality:
      priority: MEDIUM
      tests:
        - "CLI can parse a simple JSONL file"
        - "CLI query command works with basic filter"
        - "MCP server can start (timeout after 2s)"

      note: "Nice-to-have, but not critical for smoke tests"

# ==================================================================
# PLATFORM TESTING STRATEGY
# ==================================================================

platform_testing:
  strategy: "Native platform only in CI, trust Go cross-compilation"

  rationale:
    - "Go cross-compilation is highly reliable"
    - "Testing all 5 platforms requires emulation (QEMU, Docker)"
    - "Emulation adds 5-10 minutes to CI pipeline"
    - "Cost-benefit: Low likelihood of platform-specific issues"
    - "Native linux-amd64 testing catches 95% of issues"

  linux_amd64:
    test: true
    method: "Native execution"
    coverage: "Full smoke test suite"

  linux_arm64:
    test: false
    method: "N/A (trust Go cross-compilation)"
    fallback: "Manual testing on ARM systems if issues reported"

  darwin_amd64:
    test: false
    method: "N/A (trust Go cross-compilation)"
    fallback: "macOS GitHub Actions runner (expensive, slow)"

  darwin_arm64:
    test: false
    method: "N/A (trust Go cross-compilation)"
    fallback: "macOS GitHub Actions runner (expensive, slow)"

  windows_amd64:
    test: false
    method: "N/A (trust Go cross-compilation)"
    fallback: "Windows GitHub Actions runner (adds 2-3 min)"

  future_enhancement:
    - "Add platform-specific runners if issues arise"
    - "Use QEMU for ARM testing if needed"
    - "Add Windows runner if Windows-specific bugs found"

# ==================================================================
# IMPLEMENTATION APPROACH
# ==================================================================

implementation:
  script_design:
    name: scripts/smoke-tests.sh
    language: bash
    dependencies:
      - tar (extract packages)
      - file (verify binary types)
      - jq (parse JSON files)
      - chmod (verify executability)

    structure:
      - "Parse command-line arguments (version, platform)"
      - "Extract plugin package"
      - "Test 1: Binary execution (--version, --help)"
      - "Test 2: Version consistency checks"
      - "Test 3: Plugin structure validation"
      - "Test 4: Basic functionality (optional)"
      - "Report results (clear pass/fail)"
      - "Exit with appropriate code (0=pass, 1=fail)"

    error_handling:
      - "Clear error messages for each failure"
      - "Suggest fix for common issues"
      - "Log test progress for debugging"
      - "Aggregate failures (don't stop on first error)"

  workflow_integration:
    file: .github/workflows/release.yml
    insertion_point: "After 'Create plugin packages' (step 9)"
    new_step_name: "Run smoke tests"

    implementation:
      - "Run smoke-tests.sh for linux-amd64 package"
      - "Pass version and platform as arguments"
      - "Check exit code"
      - "If failed, fail the workflow (no release created)"
      - "If passed, proceed to 'Generate checksums' step"

    output:
      - "Clear test results in CI logs"
      - "Summary of passed/failed tests"
      - "Artifact paths tested"

