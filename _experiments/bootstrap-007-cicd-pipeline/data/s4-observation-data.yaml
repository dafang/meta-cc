# ==============================================================================
# DEPLOYMENT RESEARCH: Claude Plugin Marketplace
# ==============================================================================

claude_plugin_marketplace_research:

  discovery_summary: |
    Claude Code plugins use a DECENTRALIZED marketplace model based on Git repositories.
    There is NO centralized API or upload mechanism. Distribution is fully GitHub-based.

    KEY FINDING: GitHub Releases ARE the deployment mechanism!

  marketplace_architecture:
    type: "Decentralized Git-based"
    hosting: "GitHub repositories, Git repos, or direct URLs"
    distribution_method: "marketplace.json file in .claude-plugin/"
    installation_command: "/plugin marketplace add owner/repo"
    no_central_registry: true
    no_api_deployment: true

  marketplace_json_format:
    location: ".claude-plugin/marketplace.json"
    required_fields:
      - "name: Marketplace identifier (kebab-case)"
      - "owner: Maintainer information"
      - "plugins: List of available plugins"

    plugin_entry_required:
      - "name: Unique plugin identifier"
      - "source: Location of plugin (relative path, GitHub/Git repo)"

    plugin_entry_optional:
      - "description"
      - "version"
      - "author"
      - "homepage"
      - "license"
      - "keywords"
      - "category"
      - "tags"

  plugin_source_options:
    - "Relative path in repository"
    - "GitHub repository (owner/repo)"
    - "GitHub repository with ref (owner/repo@branch)"
    - "GitHub repository with version tag (owner/repo@v1.0.0)"
    - "Git repository URL"
    - "Local directory path"

  installation_workflow:
    step_1: "User runs: /plugin marketplace add yaleh/meta-cc"
    step_2: "Claude Code reads marketplace.json from repository"
    step_3: "User browses plugins with /plugin menu"
    step_4: "User installs: /plugin install meta-cc@yaleh-meta-cc"
    step_5: "Claude Code downloads plugin from source (GitHub Releases)"
    step_6: "User restarts Claude Code to activate plugin"

  current_meta_cc_marketplace:
    file: ".claude-plugin/marketplace.json"
    status: "EXISTS and well-configured"
    marketplace_name: "yaleh-meta-cc"
    owner_org: "Yaleh's Plugins"
    plugins_count: 1
    plugin_name: "meta-cc"
    plugin_source: "yaleh/meta-cc"  # Points to GitHub repo

  github_releases_mechanism:
    release_workflow: |
      1. Tag pushed (e.g., v0.28.6)
      2. GitHub Actions builds binaries and packages
      3. GitHub Actions creates GitHub Release
      4. Release includes:
         - Plugin packages (meta-cc-plugin-v0.28.6-*.tar.gz)
         - Capabilities package (capabilities-latest.tar.gz)
         - Checksums (checksums.txt)
      5. marketplace.json in repository points to source: "yaleh/meta-cc"
      6. Users install plugin, Claude Code downloads latest release

    conclusion: "GitHub Releases IS the deployment mechanism"
    already_automated: true
    no_additional_deployment_needed: true

# ==============================================================================
