# ==============================================================================
# TASK BREAKDOWN
# ==============================================================================

task_breakdown:

  task_1_build_time_tracking:
    description: "Add build time tracking to release workflow"
    file: ".github/workflows/release.yml"
    priority: "HIGH"
    effort: "LOW (15-20 lines)"

    implementation_details:
      location: "Throughout build job"
      approach: |
        1. Add job-level output for start time
        2. Calculate duration after build completes
        3. Report in workflow summary

      specific_changes:
        change_1_record_start_time:
          step_name: "Record build start time"
          position: "After 'Setup Go' step"
          implementation: |
            - name: Record build start time
              id: build_start
              run: echo "START_TIME=$(date +%s)" >> $GITHUB_OUTPUT

        change_2_calculate_duration:
          step_name: "Calculate build duration"
          position: "After 'Build binaries' step"
          implementation: |
            - name: Calculate build duration
              run: |
                START_TIME=${{ steps.build_start.outputs.START_TIME }}
                END_TIME=$(date +%s)
                DURATION=$((END_TIME - START_TIME))
                echo "Build completed in ${DURATION} seconds"
                echo "BUILD_DURATION=${DURATION}" >> $GITHUB_ENV

        change_3_report_metrics:
          step_name: "Report build metrics"
          position: "In final summary step"
          implementation: |
            Include build duration in summary:
            - Build time: ${{ env.BUILD_DURATION }}s

    expected_value: "+0.01 to V_observability"

  task_2_test_duration_tracking:
    description: "Add test duration tracking to CI workflow"
    file: ".github/workflows/ci.yml"
    priority: "MEDIUM"
    effort: "LOW (10-15 lines)"

    implementation_details:
      location: "In test job"
      approach: |
        1. Record start time before tests
        2. Calculate duration after tests
        3. Report in summary

      specific_changes:
        change_1_record_test_start:
          step_name: "Record test start time"
          position: "Before 'Run short tests' step"
          implementation: |
            - name: Record test start time
              id: test_start
              run: echo "TEST_START=$(date +%s)" >> $GITHUB_OUTPUT

        change_2_calculate_test_duration:
          step_name: "Calculate test duration"
          position: "After test steps"
          implementation: |
            - name: Calculate test duration
              if: always()
              run: |
                START=${{ steps.test_start.outputs.TEST_START }}
                END=$(date +%s)
                DURATION=$((END - START))
                echo "Tests completed in ${DURATION} seconds"
                echo "TEST_DURATION=${DURATION}" >> $GITHUB_ENV

        change_3_report_test_metrics:
          implementation: |
            Add to job summary:
            - Test duration: ${{ env.TEST_DURATION }}s

    expected_value: "+0.01 to V_observability"

  task_3_release_metrics_reporting:
    description: "Add comprehensive release metrics summary"
    file: ".github/workflows/release.yml"
    priority: "HIGH"
    effort: "MEDIUM (20-30 lines)"

    implementation_details:
      location: "After 'Create Release' step (final step)"
      approach: |
        1. Collect all metrics from previous steps
        2. Calculate total release time
        3. Count artifacts
        4. Report smoke test results
        5. Output comprehensive summary

      specific_changes:
        change_1_add_summary_step:
          step_name: "Generate release summary"
          position: "Final step in workflow"
          implementation: |
            - name: Generate release summary
              if: success()
              run: |
                echo "==================================="
                echo "Release ${{ steps.version.outputs.VERSION }} Summary"
                echo "==================================="
                echo ""
                echo "Build Metrics:"
                echo "  - Build duration: ${BUILD_DURATION}s"
                echo "  - Platforms built: 5 (linux-amd64, linux-arm64, darwin-amd64, darwin-arm64, windows-amd64)"
                echo "  - Binaries created: 10 (CLI + MCP × 5 platforms)"
                echo ""
                echo "Artifact Summary:"
                echo "  - Plugin packages: 5"
                echo "  - Capabilities package: 1"
                echo "  - Checksums: 1"
                echo "  - Total artifacts: $(ls -1 build/packages/*.tar.gz | wc -l)"
                echo ""
                echo "Quality Gates:"
                echo "  - Version verification: PASS"
                echo "  - Smoke tests: PASS"
                echo "  - Checksums: GENERATED"
                echo ""
                echo "Release Status: SUCCESS ✓"
                echo "==================================="

    expected_value: "+0.02 to V_observability, +0.02 to V_automation"

  task_4_workflow_job_summary:
    description: "Add GitHub Actions job summary (GITHUB_STEP_SUMMARY)"
    file: ".github/workflows/release.yml"
    priority: "MEDIUM"
    effort: "LOW (10-15 lines)"

    implementation_details:
      approach: |
        Use GITHUB_STEP_SUMMARY to create rich markdown summary visible in Actions UI.

      implementation: |
        - name: Create job summary
          if: success()
          run: |
            echo "## Release ${{ steps.version.outputs.VERSION }} Complete ✓" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Build Metrics" >> $GITHUB_STEP_SUMMARY
            echo "- **Build duration**: ${BUILD_DURATION}s" >> $GITHUB_STEP_SUMMARY
            echo "- **Platforms**: 5" >> $GITHUB_STEP_SUMMARY
            echo "- **Binaries**: 10" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
            echo "- Plugin packages: 5" >> $GITHUB_STEP_SUMMARY
            echo "- Total size: $(du -sh build/packages | cut -f1)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Quality Gates" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Version verification" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Smoke tests (25/25)" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Checksums generated" >> $GITHUB_STEP_SUMMARY

    expected_value: "+0.02 to V_observability"

